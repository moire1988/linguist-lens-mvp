name: Scheduled X Post

on:
  schedule:
    # UTC時間での設定（日本時間 - 9時間）
    - cron: '21 22 * * *' # 日本時間 07:21 (朝)
    - cron: '21 03 * * *' # 日本時間 12:21 (昼)
    - cron: '21 10 * * *' # 日本時間 19:21 (晩)
  workflow_dispatch: # 手動実行ボタンも追加

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # 直近投稿フレーズ履歴を実行間で引き継ぐ（毎回新しい key で保存し、restore-keys で最新を復元）
      - uses: actions/cache@v4
        with:
          path: scripts/posted_history.json
          key: posted-history-${{ github.run_id }}
          restore-keys: |
            posted-history-
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm run post-to-x
        env:
          # 変数名は据え置き: 値は Groq API キー（scripts/post-to-x.ts が Groq を呼ぶ）
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
