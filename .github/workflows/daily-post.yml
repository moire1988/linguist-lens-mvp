name: Scheduled X Post

on:
  schedule:
    # UTC時間での設定（日本時間 - 9時間）
    - cron: '21 22 * * *' # 日本時間 07:21 (朝)
    - cron: '21 03 * * *' # 日本時間 12:21 (昼)
    - cron: '21 10 * * *' # 日本時間 19:21 (晩)
  workflow_dispatch: # 手動実行ボタンも追加

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm run post-to-x
        env:
          # 明示指定（未指定だとスクリプト既定の gemini-1.5-flash。2.0 系はクォータ制約で失敗しやすい）
          GEMINI_POST_MODEL: gemini-1.5-flash
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
