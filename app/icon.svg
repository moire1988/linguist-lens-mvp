<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g1" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="g2" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <clipPath id="circ">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
    <clipPath id="upper">
      <polygon points="0,0 100,0 0,100"/>
    </clipPath>
    <clipPath id="lower">
      <polygon points="100,0 100,100 0,100"/>
    </clipPath>
  </defs>
  <g clip-path="url(#circ)">
    <rect width="100" height="100" fill="url(#g1)" clip-path="url(#upper)"/>
    <rect width="100" height="100" fill="url(#g2)" clip-path="url(#lower)"/>
  </g>
</svg>
